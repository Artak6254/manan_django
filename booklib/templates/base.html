{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- <link rel="stylesheet" href="{% static 'css/booksCss/card.css' %}"> -->
  <link rel="stylesheet" href="{% static 'css/loginRegister.css' %}">
  
  {% block extra_css %} {% endblock  %}
    
    <title>Document</title>
</head>
<body data-register-url="{% url 'register_user' %}" data-csrf="{{ csrf_token }}">
      <header>
    <div class="wrapper">
      <div class="row">
        <div class="logo">
          <img src="{% static 'images/detail.png' %}" alt="">
          <a href="{% url 'index' %}">Գրադարան</a>
          <img src="{% static 'images/detail.png' %}" alt="">
        </div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
      </div>
    </div>
  </header>
  <div class="login-register">
     <nav class="right-navbar">
        {% if user.is_authenticated %}
        <a href="{% url 'user_account' %}">օգտվողի էջ</a>
       <form action="{% url 'logout' %}" method="post" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="logout_btn" >ԵԼՔ</button>
      </form>
        {% else %}
        <a href="{% url 'contact' %}">կապ</a>
      <a href="{% url 'login_page' %}">մուտք</a>
      <a href="{% url 'register' %}">գրանցում</a>
      {% endif %}
    </nav>
        
    </nav>
  </div>
  {% block content %} {% endblock %}

  <footer>
    <div class="row">
      <div class="logo">
        <img src="{% static 'images/detail.png' %}" alt="">
        <a href="#"> © 2026 Գրադարան | Բոլոր իրավունքները պաշտպանված են</a>
        <img src="{% static 'images/detail.png' %}" alt="">
      </div>
    </div>

  </footer>
  <script  src="{% static 'js/app.js' %}"></script>
</body>
</html>
